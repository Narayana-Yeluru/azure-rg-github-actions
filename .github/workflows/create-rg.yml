name: Reusable - Create Azure Resource Group

on:
  workflow_call:
    inputs:
      resource_group:
        required: true
        type: string
      location:
        required: true
        type: string

jobs:
  create-rg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          chmod +x scripts/create-rg.sh
          ./scripts/create-rg.sh "${{ inputs.resource_group }}" "${{ inputs.location }}"
